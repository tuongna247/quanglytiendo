services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: qltiando_db
    environment:
      POSTGRES_DB: QuanLyTienDo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - db_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      shared-infra-net:
        aliases:
          - shared-postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d QuanLyTienDo"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── .NET API ──────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api/QuanLyTienDo.API
      dockerfile: Dockerfile
    container_name: qltiando_api
    environment:
      ConnectionStrings__DefaultConnection: "Host=shared-postgres;Database=QuanLyTienDo;Username=postgres;Password=${DB_PASSWORD}"
      Jwt__Key: "${JWT_KEY}"
      Jwt__Issuer: "QuanLyTienDo.API"
      Jwt__Audience: "QuanLyTienDo.Web"
      Jwt__ExpiryDays: "7"
      Cors__AllowedOrigins__0: "${WEB_ORIGIN}"
      ASPNETCORE_ENVIRONMENT: "Production"
      SendGrid__ApiKey: "${SENDGRID_API_KEY:-}"
      SendGrid__FromEmail: "${SENDGRID_FROM_EMAIL:-noreply@example.com}"
      App__Url: "${APP_URL:-http://localhost:3010}"
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "5015"
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - shared-infra-net
    restart: unless-stopped

  # ── Next.js Web ───────────────────────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        API_URL: "http://api:5015"
    container_name: qltiando_web
    depends_on:
      api:
        condition: service_started
    environment:
      NODE_ENV: production
      # Giới hạn Node.js heap để tránh OOM
      NODE_OPTIONS: "--max-old-space-size=512"
    ports:
      - "${WEB_PORT:-3010}:3000"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - shared-infra-net
    restart: unless-stopped

volumes:
  db_data:
    name: qltiendo_db_data
    external: true

networks:
  shared-infra-net:
    external: true
