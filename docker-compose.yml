version: '3.9'

services:
  # ── SQL Server ────────────────────────────────────────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: qltiando_db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_SA_PASSWORD}"
      MSSQL_PID: "Express"
    volumes:
      - db_data:/var/opt/mssql
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${DB_SA_PASSWORD}", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── .NET API ──────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api/QuanLyTienDo.API
      dockerfile: Dockerfile
    container_name: qltiando_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=QuanLyTienDo;User Id=sa;Password=${DB_SA_PASSWORD};TrustServerCertificate=True;"
      Jwt__Key: "${JWT_KEY}"
      Jwt__Issuer: "QuanLyTienDo.API"
      Jwt__Audience: "QuanLyTienDo.Web"
      Jwt__ExpiryDays: "7"
      Cors__AllowedOrigins__0: "http://${SERVER_HOST}"
      Cors__AllowedOrigins__1: "https://${SERVER_HOST}"
      ASPNETCORE_ENVIRONMENT: "Production"
    ports:
      - "5015:5015"
    restart: unless-stopped

  # ── Next.js Web ───────────────────────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: qltiando_web
    depends_on:
      - api
    environment:
      NODE_ENV: production
      # API rewrite target — points to api container inside Docker network
      API_URL: "http://api:5015"
    ports:
      - "3000:3000"
    restart: unless-stopped

  # ── Nginx reverse proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: qltiando_nginx
    depends_on:
      - web
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    restart: unless-stopped

volumes:
  db_data:
