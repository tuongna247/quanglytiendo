services:
  # ── .NET API ──────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api/QuanLyTienDo.API
      dockerfile: Dockerfile
    container_name: qltiando_api
    environment:
      ConnectionStrings__DefaultConnection: "Server=shared-sqlserver,1433;Database=QuanLyTienDo;User Id=sa;Password=${DB_SA_PASSWORD};TrustServerCertificate=True;"
      Jwt__Key: "${JWT_KEY}"
      Jwt__Issuer: "QuanLyTienDo.API"
      Jwt__Audience: "QuanLyTienDo.Web"
      Jwt__ExpiryDays: "7"
      Cors__AllowedOrigins__0: "${WEB_ORIGIN}"
      ASPNETCORE_ENVIRONMENT: "Production"
      SendGrid__ApiKey: "${SENDGRID_API_KEY:-}"
      SendGrid__FromEmail: "${SENDGRID_FROM_EMAIL:-noreply@example.com}"
      App__Url: "${APP_URL:-http://localhost:3010}"
    expose:
      - "5015"
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - shared-infra-net
    restart: unless-stopped

  # ── Next.js Web ───────────────────────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        API_URL: "http://api:5015"
    container_name: qltiando_web
    depends_on:
      - api
    environment:
      NODE_ENV: production
      # Giới hạn Node.js heap để tránh OOM
      NODE_OPTIONS: "--max-old-space-size=512"
    ports:
      - "${WEB_PORT:-3010}:3000"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - shared-infra-net
    restart: unless-stopped

networks:
  shared-infra-net:
    external: true
