version: '3.9'

services:
  # ── SQL Server ────────────────────────────────────────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: qltiando_db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_SA_PASSWORD}"
      MSSQL_PID: "Developer"
      # Giới hạn RAM SQL Server dùng (MB) — tránh chiếm hết RAM server
      MSSQL_MEMORY_LIMIT_MB: "2048"
    volumes:
      - db_data:/var/opt/mssql
    deploy:
      resources:
        limits:
          memory: 2.5g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${DB_SA_PASSWORD}", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── .NET API ──────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api/QuanLyTienDo.API
      dockerfile: Dockerfile
    container_name: qltiando_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=QuanLyTienDo;User Id=sa;Password=${DB_SA_PASSWORD};TrustServerCertificate=True;"
      Jwt__Key: "${JWT_KEY}"
      Jwt__Issuer: "QuanLyTienDo.API"
      Jwt__Audience: "QuanLyTienDo.Web"
      Jwt__ExpiryDays: "7"
      Cors__AllowedOrigins__0: "${WEB_ORIGIN}"
      ASPNETCORE_ENVIRONMENT: "Production"
      SendGrid__ApiKey: "${SENDGRID_API_KEY:-}"
      SendGrid__FromEmail: "${SENDGRID_FROM_EMAIL:-noreply@example.com}"
      App__Url: "${APP_URL:-http://localhost:3010}"
    expose:
      - "5015"
    deploy:
      resources:
        limits:
          memory: 512m
    restart: unless-stopped

  # ── Next.js Web ───────────────────────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        API_URL: "http://api:5015"
    container_name: qltiando_web
    depends_on:
      - api
    environment:
      NODE_ENV: production
      # Giới hạn Node.js heap để tránh OOM
      NODE_OPTIONS: "--max-old-space-size=512"
    ports:
      - "${WEB_PORT:-3010}:3000"
    deploy:
      resources:
        limits:
          memory: 700m
    restart: unless-stopped

volumes:
  db_data:
