# /opt/apps/nginx/conf.d/tasks.kinhthanhmoingay.com.conf
# Sau khi copy lên server:
#   sudo nginx -t && sudo systemctl reload nginx
# Lấy SSL cert (nếu chưa có):
#   sudo certbot certonly --nginx -d tasks.kinhthanhmoingay.com

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name tasks.kinhthanhmoingay.com;
    return 301 https://$host$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name tasks.kinhthanhmoingay.com;

    ssl_certificate     /etc/letsencrypt/live/tasks.kinhthanhmoingay.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tasks.kinhthanhmoingay.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    # ── Next.js (handles /api/* and /hubs/* rewrites internally) ─────────────
    location / {
        proxy_pass         http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600s;
    }
}
